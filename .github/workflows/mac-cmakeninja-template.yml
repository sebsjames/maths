name: Mac Template
on:
  workflow_call:
    inputs:
      RUNNER_IMAGE:
        required: true
        type: string
      BUILD_TYPE:
        required: true
        type: string
      CC:
        required: true
        type: string
      CXX:
        required: true
        type: string
      CMAKE_CXX_FLAGS:
        required: false
        type: string

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ${{ inputs.RUNNER_IMAGE }}

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Install GitHub CLI
      run: |
        brew trust aws/tap
        brew update
        brew install gh

    - name: Install dependencies
      run: |
        brew trust aws/tap
        brew update
        brew install libomp hdf5 llvm

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{ github.workspace }}/build -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/install -DCMAKE_BUILD_TYPE=${{ inputs.BUILD_TYPE }} -DBUILD_TESTS=ON -DBUILD_EXAMPLES=ON -GNinja -DCMAKE_CXX_FLAGS=${{ inputs.CMAKE_CXX_FLAGS }}
      env:
        CC: ${{ inputs.CC }}
        CXX: ${{ inputs.CXX }}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{ github.workspace }}/build --config ${{ inputs.BUILD_TYPE }}}
      env:
        CC: ${{ inputs.CC }}
        CXX: ${{ inputs.CXX }}

    - name: Test
      working-directory: ${{ github.workspace }}/build
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -C ${{ inputs.BUILD_TYPE }} -V

    - name: Test if all morph headers are installed
      working-directory: ${{ github.workspace }}/build
      run: |
        ninja install
        ./../ci_scripts/check_installed_headers.sh
